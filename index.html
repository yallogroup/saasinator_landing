<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>saasinator.ai — Just In Time Software</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#06060F;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* ── CANVAS LAYERS ── */
#grid-canvas{display:none}
#wave-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ── CSS LINE GRID ── */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(167,139,250,0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,0.055) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* ── STAGE ── */
.stage{
  position:fixed;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;
  gap:0;
}

/* ── LOGO MARK ── */
.mark-outer{
  position:relative;
  margin-bottom:32px;
  width:72px;height:72px;
}
.mark-outer svg{
  width:100%;height:100%;display:block;
  filter:drop-shadow(0 4px 32px rgba(124,58,237,.45));
}
.orbit{
  position:absolute;
  border-radius:50%;
  border:1.5px solid;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.orbit-1{
  width:96px;height:96px;
  border-color:rgba(124,58,237,.3);
  animation:orbit-spin 12s linear infinite;
}
.orbit-2{
  width:120px;height:120px;
  border-color:rgba(124,58,237,.12);
  animation:orbit-spin 20s linear infinite reverse;
}
.orbit-dot{
  position:absolute;
  width:5px;height:5px;
  border-radius:50%;
  background:#A78BFA;
  top:-2.5px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 0 10px rgba(167,139,250,.9);
}
.orbit-dot-2{
  background:#22D3EE;
  box-shadow:0 0 10px rgba(34,211,238,.8);
  top:auto;bottom:-2.5px;
}
@keyframes orbit-spin{
  from{transform:translate(-50%,-50%) rotate(0deg)}
  to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* ── WORDMARK ── */
.wordmark{
  font-family:'DM Mono',monospace;
  font-size:clamp(42px,8vw,88px);
  font-weight:600;
  letter-spacing:-3px;
  line-height:1;
  margin-bottom:14px;
  color:#F0EFFE;
  text-align:center;
  opacity:0;
  animation:rise .8s cubic-bezier(.34,1.56,.64,1) forwards .2s;
  transition:transform .12s ease-out;
}
.wordmark .ai{
  background:linear-gradient(135deg,#A78BFA,#818CF8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── TAGLINES ── */
.tagline-group{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  margin-bottom:28px;text-align:center;
}
.t-eye{
  font-family:'DM Mono',monospace;
  font-size:clamp(9px,1.5vw,11px);
  letter-spacing:5px;text-transform:uppercase;
  color:rgba(167,139,250,.55);
  opacity:0;animation:rise .6s ease forwards .5s;
}
.t-main{
  font-size:clamp(14px,2.2vw,18px);
  font-weight:300;color:rgba(240,239,254,.4);
  letter-spacing:-.2px;line-height:1.5;
  opacity:0;animation:rise .6s ease forwards .65s;
}
.t-main strong{
  color:rgba(240,239,254,.85);font-weight:700;
}

/* ── JIT LINE ── */
.jit{
  font-family:'DM Mono',monospace;
  font-size:clamp(9px,1.4vw,11px);
  letter-spacing:7px;text-transform:uppercase;
  color:rgba(240,239,254,.38);
  margin-bottom:36px;
  opacity:0;animation:rise .6s ease forwards 1.05s;
}

/* ── SOCIAL ── */
.social-row{
  display:flex;align-items:center;gap:12px;
  opacity:0;animation:rise .6s ease forwards 1.25s;
}
.s-label{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(240,239,254,.2);
}
.s-link{
  display:flex;align-items:center;gap:7px;
  text-decoration:none;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(124,58,237,.3);
  border-radius:30px;
  padding:8px 16px;
  box-shadow:0 2px 16px rgba(124,58,237,.12);
  transition:all .25s;
}
.s-link:hover{
  background:rgba(124,58,237,.12);
  border-color:rgba(167,139,250,.55);
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(124,58,237,.25);
}
.s-link svg{
  width:13px;height:13px;
  fill:rgba(167,139,250,.65);
  transition:fill .25s;flex-shrink:0;
}
.s-link:hover svg{fill:#A78BFA}
.s-link span{
  font-family:'DM Mono',monospace;
  font-size:10px;font-weight:500;
  color:rgba(167,139,250,.65);
  letter-spacing:1px;
  transition:color .25s;
}
.s-link:hover span{color:#A78BFA}

/* ── LAUNCH BLOCK ── */
.launch-block{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  margin-top:28px;
  opacity:0;animation:rise .6s ease forwards 1.45s;
}
.launch-divider{
  display:flex;align-items:center;gap:14px;
  width:260px;
}
.launch-divider::before,.launch-divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,.2),transparent);
}
.launch-divider span{
  font-family:'DM Mono',monospace;
  font-size:7px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(167,139,250,.3);
  white-space:nowrap;
}
.launch-main{
  font-size:clamp(15px,2.2vw,20px);
  font-weight:700;
  color:rgba(240,239,254,.82);
  letter-spacing:-.3px;
  text-align:center;
}
.launch-main .jit-accent{
  background:linear-gradient(135deg,#A78BFA,#22D3EE);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.launch-sub{
  font-family:'DM Mono',monospace;
  font-size:clamp(9px,1.3vw,10px);
  letter-spacing:4px;text-transform:uppercase;
  color:rgba(167,139,250,.45);
}
/* animated build bar */
.build-track{
  display:flex;align-items:center;gap:8px;
  margin-top:4px;
}
.build-segments{
  display:flex;gap:3px;
}
.build-seg{
  width:18px;height:3px;border-radius:2px;
  background:rgba(124,58,237,.18);
  animation:seg-fill 2.8s ease-in-out infinite;
}
.build-seg:nth-child(1){animation-delay:0s}
.build-seg:nth-child(2){animation-delay:.18s}
.build-seg:nth-child(3){animation-delay:.36s}
.build-seg:nth-child(4){animation-delay:.54s}
.build-seg:nth-child(5){animation-delay:.72s}
.build-seg:nth-child(6){animation-delay:.90s}
.build-seg:nth-child(7){animation-delay:1.08s}
.build-seg:nth-child(8){animation-delay:1.26s}
@keyframes seg-fill{
  0%,100%{background:rgba(124,58,237,.18)}
  40%,60%{background:linear-gradient(90deg,#7C3AED,#22D3EE);box-shadow:0 0 6px rgba(124,58,237,.4)}
}
.build-label{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(167,139,250,.35);
}

/* ── CORNER ── */
.corner{
  position:fixed;bottom:20px;left:0;right:0;
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.28);z-index:3;
  opacity:0;animation:rise .6s ease forwards 1.7s;
  white-space:nowrap;
}

/* ── KEYFRAMES ── */
@keyframes rise{
  0%{opacity:0;transform:translateY(14px)}
  100%{opacity:1;transform:translateY(0)}
}

/* ── AMBIENT BG BLOBS ── */
.blob{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:0;
  filter:blur(80px);
}
.blob-1{
  width:600px;height:600px;
  top:-180px;right:-120px;
  background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);
  animation:blob-drift 14s ease-in-out infinite alternate;
}
.blob-2{
  width:500px;height:500px;
  bottom:-120px;left:-100px;
  background:radial-gradient(circle,rgba(8,145,178,.08),transparent 70%);
  animation:blob-drift 18s ease-in-out infinite alternate-reverse;
}
.blob-3{
  width:400px;height:400px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(167,139,250,.07),transparent 70%);
  animation:blob-drift 10s ease-in-out infinite alternate;
}
@keyframes blob-drift{
  0%{transform:translate(0,0)}
  100%{transform:translate(30px,25px)}
}

@media(max-width:480px){
  .wordmark{letter-spacing:-1.5px}
  .orbit-1{width:84px;height:84px}
  .orbit-2{width:104px;height:104px}
  .p-bar{width:80px}
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="grid-bg"></div>
<canvas id="grid-canvas"></canvas>
<canvas id="wave-canvas"></canvas>

<div class="stage">

  <div class="mark-outer" id="markOuter">
    <div class="orbit orbit-1">
      <div class="orbit-dot"></div>
    </div>
    <div class="orbit orbit-2">
      <div class="orbit-dot orbit-dot-2"></div>
    </div>
    <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mg" x1="0" y1="0" x2="70" y2="70" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#A78BFA"/>
          <stop offset="100%" stop-color="#818CF8"/>
        </linearGradient>
      </defs>
      <rect x="2" y="2" width="36" height="36" rx="4" fill="url(#mg)"/>
      <rect x="46" y="9" width="22" height="22" rx="3" fill="none" stroke="url(#mg)" stroke-width="2.5"/>
      <rect x="9" y="46" width="22" height="22" rx="3" fill="none" stroke="url(#mg)" stroke-width="2.5"/>
      <rect x="46" y="46" width="22" height="22" rx="3" fill="url(#mg)"/>
    </svg>
  </div>

  <div class="wordmark" id="wm">saasinator<span class="ai">.ai</span></div>

  <div class="tagline-group">
    <div class="t-eye">Enterprise AI</div>
    <div class="t-main">Build what you need. <strong>Own what you build.</strong></div>
  </div>

  <div class="jit">Just &nbsp;In &nbsp;Time &nbsp;Software</div>

  <div class="social-row">
    <div class="s-label">Follow us</div>
    <a class="s-link" href="https://www.linkedin.com/company/saasinator/" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span>saasinator</span>
    </a>
  </div>

  <!-- LAUNCH BLOCK -->
  <div class="launch-block" style="margin-top:48px">
    <div class="launch-divider"><span>coming soon</span></div>
    <div class="launch-main">Arriving <span class="jit-accent">just in time.</span></div>
    <div class="launch-sub">Something is being built here</div>
    <div class="build-track">
      <div class="build-segments">
        <div class="build-seg"></div>
        <div class="build-seg"></div>
        <div class="build-seg"></div>
        <div class="build-seg"></div>
        <div class="build-seg"></div>
        <div class="build-seg"></div>
        <div class="build-seg"></div>
        <div class="build-seg"></div>
      </div>
      <div class="build-label">building</div>
    </div>
  </div>

</div>

<div class="corner">saasinator.ai · YALLO Group · 2026</div>

<script>
// ═══════════════════════════════════════
// GRID CANVAS — dot grid background
// ═══════════════════════════════════════
const gc = document.getElementById('grid-canvas');
const gx = gc.getContext('2d');

function resizeGrid(){
  gc.width = window.innerWidth;
  gc.height = window.innerHeight;
  drawGrid();
}

function drawGrid(){
  const W = gc.width, H = gc.height;
  const STEP = 28;
  gx.clearRect(0,0,W,H);
  for(let x=0; x<=W; x+=STEP){
    for(let y=0; y<=H; y+=STEP){
      gx.beginPath();
      gx.arc(x, y, 1.1, 0, Math.PI*2);
      gx.fillStyle = 'rgba(167,139,250,0.12)';
      gx.fill();
    }
  }
}

resizeGrid();
window.addEventListener('resize', resizeGrid);


// ═══════════════════════════════════════
// WAVE CANVAS — AI ripple on mouse move
// ═══════════════════════════════════════
const wc = document.getElementById('wave-canvas');
const wx = wc.getContext('2d');
let WW, WH;

function resizeWave(){
  WW = wc.width = window.innerWidth;
  WH = wc.height = window.innerHeight;
}
resizeWave();
window.addEventListener('resize', resizeWave);

let mouse = {x: -999, y: -999};
let ripples = [];

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if(Math.random() < 0.18){
    ripples.push({
      x: e.clientX, y: e.clientY,
      r: 0, maxR: 60 + Math.random()*60,
      alpha: 0.4,
      color: Math.random() > 0.5
        ? [167,139,250] : [34,211,238],
    });
  }
});

window.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, {passive:true});

let t = 0;
const LINES = 6;

function drawWaves(){
  wx.clearRect(0,0,WW,WH);

  if(mouse.x > 0){
    const grad = wx.createRadialGradient(
      mouse.x,mouse.y,0,
      mouse.x,mouse.y,160
    );
    grad.addColorStop(0,'rgba(124,58,237,0.09)');
    grad.addColorStop(1,'rgba(124,58,237,0)');
    wx.fillStyle = grad;
    wx.fillRect(0,0,WW,WH);
  }

  for(let i=0;i<LINES;i++){
    const phase = (i/LINES)*Math.PI*2;
    const amp = 18 + i*6;
    const speed = 0.003 + i*0.001;
    const yBase = WH * (0.25 + i * 0.1);

    const mdist = Math.abs(mouse.y - yBase);
    const mInfluence = Math.max(0, 1 - mdist/220) * 22;

    wx.beginPath();
    wx.moveTo(0, yBase);
    for(let x=0;x<=WW;x+=3){
      const xNorm = x/WW;
      const mDistX = Math.abs(mouse.x - x);
      const mBump = Math.max(0,1-mDistX/180)*mInfluence;
      const y = yBase
        + Math.sin(xNorm*4*Math.PI + t*speed*4 + phase)*amp
        + mBump*Math.sin(xNorm*Math.PI*3 + t*0.018);
      wx.lineTo(x, y);
    }
    const alpha = 0.06 + (i%2)*0.03;
    wx.strokeStyle = i%2===0
      ? `rgba(167,139,250,${alpha})`
      : `rgba(34,211,238,${alpha*0.7})`;
    wx.lineWidth = 1.5;
    wx.stroke();
  }

  ripples.forEach(r => {
    wx.beginPath();
    wx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    wx.strokeStyle = `rgba(${r.color[0]},${r.color[1]},${r.color[2]},${r.alpha})`;
    wx.lineWidth = 1.2;
    wx.stroke();
    r.r += 2.2;
    r.alpha *= 0.93;
  });
  ripples = ripples.filter(r => r.alpha > 0.01);

  t++;
  requestAnimationFrame(drawWaves);
}
drawWaves();


// ═══════════════════════════════════════
// PARALLAX — logo + wordmark on mouse
// ═══════════════════════════════════════
const markEl = document.getElementById('markOuter');
const wmEl   = document.getElementById('wm');
let cx = window.innerWidth/2;
let cy = window.innerHeight/2;

window.addEventListener('mousemove', e => {
  const dx = (e.clientX - cx)/cx;
  const dy = (e.clientY - cy)/cy;
  markEl.style.transform = `translate(${dx*12}px,${dy*9}px)`;
  wmEl.style.transform   = `translate(${dx*6}px,${dy*4}px)`;
});
window.addEventListener('resize',()=>{
  cx=window.innerWidth/2;
  cy=window.innerHeight/2;
});
</script>
</body>
</html>
